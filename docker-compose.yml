version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: caregiver_hub
      POSTGRES_USER: caregiver_user
      POSTGRES_PASSWORD: caregiver_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caregiver_user -d caregiver_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://caregiver_user:caregiver_pass@postgres:5432/caregiver_hub
      JWT_SECRET: dev-secret-change-in-production
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  postgres_data:
